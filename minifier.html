orps tonique, souple et libéré de ses tensions<\u002Fh1>\n <p style=\"font-size:15.5px; line-height:1.6; color:#F3E4C8; margin:0 0 26px; font-weight:400; text-shadow:0 1px 10px rgba(0,0,0,0.4);\">Rejoignez Sandra Chancel chez Bien Etre En Sport pour des séances de Pilates adaptées à votre corps.<\u002Fp>\n <a href=\"tel:0692642616\" style=\"display:inline-block; padding:15px 38px; background:rgba(255,249,234,0.97); color:#3E4A34; font-family:'Inter',sans-serif; font-weight:600; letter-spacing:0.03em; font-size:13.5px; text-transform:uppercase; border-radius:100px; box-shadow:0 10px 30px -8px rgba(0,0,0,0.45);\">Réserver ma séance d'essai<\u002Fa>\n <\u002Fdiv>\n <\u002Fdiv>\n <\u002Fsection>\n\n \n <section data-screen-label=\"Pourquoi\" style=\"padding:72px 28px; background:#FFF4D9;\">\n <h2 style=\"font-family:'Gloock',serif; font-weight:400; font-size:28px; line-height:1.35; text-align:center; margin:0 0 48px; color:#4A342B;\">Votre corps vous envoie des signaux…<\u002Fh2>\n\n <div style=\"display:flex; flex-direction:column; gap:0;\">\n <div style=\"display:flex; gap:20px; align-items:flex-start; padding:26px 0; border-top:1px solid rgba(151,148,107,0.3);\">\n <div style=\"flex-shrink:0; width:44px; height:44px; display:flex; align-items:center; justify-content:center;\">\n <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#97946B\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"3.5\" r=\"1.6\" fill=\"#97946B\" stroke=\"none\"><\u002Fcircle><path d=\"M12 6v15\"><\u002Fpath><path d=\"M9 9h6M9 12.5h6M9 16h6M9 19.5h6\"><\u002Fpath><\u002Fsvg>\n <\u002Fdiv>\n <div>\n <h3 style=\"font-family:'Inter',sans-serif; font-weight:600; font-size:17px; margin:0 0 8px; color:#4A342B;\">Mal de dos et tensions cervicales<\u002Fh3>\n <p style=\"font-size:15px; line-height:1.6; color:#6B5142; margin:0;\">Les heures passées assis ou debout laissent des traces : le dos se raidit, la nuque tire en permanence.<\u002Fp>\n <\u002Fdiv>\n <\u002Fdiv>\n\n <div style=\"display:flex; gap:20px; align-items:flex-start; padding:26px 0; border-top:1px solid rgba(151,148,107,0.3);\">\n <div style=\"flex-shrink:0; width:44px; height:44px; display:flex; align-items:center; justify-content:center;\">\n <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#97946B\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 3H3v6\"><\u002Fpath><path d=\"M15 3h6v6\"><\u002Fpath><path d=\"M9 21H3v-6\"><\u002Fpath><path d=\"M15 21h6v-6\"><\u002Fpath><\u002Fsvg>\n <\u002Fdiv>\n <div>\n <h3 style=\"font-family:'Inter',sans-serif; font-weight:600; font-size:17px; margin:0 0 8px; color:#4A342B;\">Manque de souplesse<\u002Fh3>\n <p style=\"font-size:15px; line-height:1.6; color:#6B5142; margin:0;\">Les gestes du quotidien deviennent plus difficiles, votre corps semble se refermer sur lui-même.<\u002Fp>\n <\u002Fdiv>\n <\u002Fdiv>\n\n <div style=\"display:flex; gap:20px; align-items:flex-start; padding:26px 0; border-top:1px solid rgba(151,148,107,0.3); border-bottom:1px solid rgba(151,148,107,0.3);\">\n <div style=\"flex-shrink:0; width:44px; height:44px; display:flex; align-items:center; justify-content:center;\">\n <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#97946B\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 13a3 3 0 0 1 .3-6 4 4 0 0 1 7.6-1.4 2.8 2.8 0 0 1-.4 7.4H6z\"><\u002Fpath><path d=\"M13 15l-2 3.5h2.4L11.5 22\" stroke-width=\"1.8\"><\u002Fpath><\u002Fsvg>\n <\u002Fdiv>\n <div>\n <h3 style=\"font-family:'Inter',sans-serif; font-weight:600; font-size:17px; margin:0 0 8px; color:#4A342B;\">Stress et fatigue physique<\u002Fh3>\n <p style=\"font-size:15px; line-height:1.6; color:#6B5142; margin:0;\">L'esprit tourne en boucle, et le corps ne récupère plus vraiment, même après le repos.<\u002Fp>\n <\u002Fdiv>\n <\u002Fdiv>\n <\u002Fdiv>\n <\u002Fsection>\n\n \n <section data-screen-label=\"Solution\" style=\"padding:72px 28px; background:#E8C79B;\">\n <p style=\"font-family:'Inter',sans-serif; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; font-size:12px; color:#7A594F; text-align:center; margin:0 0 16px;\">La méthode<\u002Fp>\n <h2 style=\"font-family:'Gloock',serif; font-weight:400; font-size:28px; line-height:1.35; text-align:center; margin:0 0 36px; color:#4A342B;\">L'approche de Sandra Chancel<\u002Fh2>\n\n <img src=\"193af151-f629-47b3-a429-0934eb6daeb7\" alt=\"Sandra accompagne une élève lors d'une séance de Pilates\" style=\"width:100%; height:300px; object-fit:cover; border-radius:6px; margin-bottom:36px;\">\n\n <p style=\"font-size:16px; line-height:1.75; color:#4A342B; margin:0 0 20px;\">Forte de ses années d'expérience dans le sport et la santé, Sandra vous propose une pratique personnalisée et adaptée à vos besoins. Écoute attentive, bienveillance et adaptation constante guident chaque séance.<\u002Fp>\n <p style=\"font-size:16px; line-height:1.75; color:#4A342B; margin:0 0 36px;\">Au programme : renforcement de la ceinture abdo-lombaire, correction posturale et renforcement musculaire généralisé, dans un cadre chaleureux, pour un mieux-être qui dure.<\u002Fp>\n\n <div style=\"display:flex; flex-direction:column; gap:1px; background:#C09173; border-radius:6px; overflow:hidden;\">\n <div style=\"background:#FFF4D9; padding:22px 22px; display:flex; gap:16px; align-items:flex-start;\">\n <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#97946B\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0; margin-top:2px;\"><circle cx=\"12\" cy=\"4\" r=\"1.6\" fill=\"#97946B\" stroke=\"none\"><\u002Fcircle><path d=\"M12 6v7\"><\u002Fpath><path d=\"M8.5 9.5h7\"><\u002Fpath><path d=\"M12 13l-3 7\"><\u002Fpath><path d=\"M12 13l3 7\"><\u002Fpath><path d=\"M18.5 3v18\" stroke-dasharray=\"2 2.5\" stroke-width=\"1.2\"><\u002Fpath><\u002Fsvg>\n <p style=\"margin:0; font-size:15px; line-height:1.55; color:#4A342B;\"><strong>Atelier \"Ta posture… ton Futur\"<\u002Fstrong> : vivre mieux dans son corps, pour longtemps.<\u002Fp>\n <\u002Fdiv>\n <div style=\"background:#FFF4D9; padding:22px 22px; display:flex; gap:16px; align-items:flex-start;\">\n <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#97946B\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0; margin-top:2px;\"><path d=\"M7.5 13V6.5a1.4 1.4 0 0 1 2.8 0V12\"><\u002Fpath><path d=\"M10.3 11.5V4.5a1.4 1.4 0 0 1 2.8 0V12\"><\u002Fpath><path d=\"M13.1 12V6a1.4 1.4 0 0 1 2.8 0v8.5\"><\u002Fpath><path d=\"M15.9 12.5V9.5a1.4 1.4 0 0 1 2.8 0V15c0 3.3-2.4 6-5.4 6h-1.6c-1.8 0-2.7-.8-3.6-2l-2.4-3a1.3 1.3 0 0 1 .3-1.8 1.3 1.3 0 0 1 1.8.2L7.5 13\"><\u002Fpath><\u002Fsvg>\n <p style=\"margin:0; font-size:15px; line-height:1.55; color:#4A342B;\"><strong>Massages thérapeutiques<\u002Fstrong> conçus pour répondre à vos besoins spécifiques.<\u002Fp>\n <\u002Fdiv>\n <\u002Fdiv>\n <\u002Fsection>\n\n \n <section data-screen-label=\"Témoignages\" style=\"padding:72px 28px; background:#FFF4D9;\">\n <h2 style=\"font-family:'Gloock',serif; font-weight:400; font-size:28px; line-height:1.35; text-align:center; margin:0 0 48px; color:#4A342B;\">Ils ont retrouvé leur bien-être<\u002Fh2>\n\n <div style=\"display:flex; flex-direction:column; gap:1px; background:rgba(151,148,107,0.3);\">\n <div style=\"background:#FFF4D9; padding:28px 4px;\">\n <div style=\"display:flex; gap:3px; margin-bottom:14px;\">\n <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#C09173\"><path d=\"M12 2l2.9 6.9L22 9.6l-5.5 4.8L18 22l-6-3.9L6 22l1.5-7.6L2 9.6l7.1-.7z\"><\u002Fpath><\u002Fsvg>\n <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#C09173\"><path d=\"M12 2l2.9 6.9L22 9.6l-5.5 4.8L18 22l-6-3.9L6 22l1.5-7.6L2 9.6l7.1-.7z\"><\u002Fpath><\u002Fsvg>\n <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#C09173\"><path d=\"M12 2l2.9 6.9L22 9.6l-5.5 4.8L18 22l-6-3.9L6 22l1.5-7.6L2 9.6l7.1-.7z\"><\u002Fpath><\u002Fsvg>\n <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#C09173\"><path d=\"M12 2l2.9 6.9L22 9.6l-5.5 4.8L18 22l-6-3.9L6 22l1.5-7.6L2 9.6l7.1-.7z\"><\u002Fpath><\u002Fsvg>\n <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#C09173\"><path d=\"M12 2l2.9 6.9L22 9.6l-5.5 4.8L18 22l-6-3.9L6 22l1.5-7.6L2 9.6l7.1-.7z\"><\u002Fpath><\u002Fsvg>\n <\u002Fdiv>\n <p style=\"font-size:15px; line-height:1.65; color:#4A342B; margin:0 0 16px; font-style:italic;\">« J'ai suivi l'atelier \"Ta posture… ton Futur\" avec Sandra et j'ai appris énormément de choses sur mon corps. Sandra est très pédagogue et très bienveillante. Les 2h30 passent très rapidement et dans la bonne humeur. Merci pour cette très belle expérience. »<\u002Fp>\n <p style=\"font-size:14px; font-weight:600; color:#7A594F; margin:0;\">Lauli Cri<\u002Fp>\n <\u002Fdiv>\n\n <div style=\"background:#FFF4D9; padding:28px 4px;\">\n <div style=\"display:flex; gap:3px; margin-bottom:14px;\">\n <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#C09173\"><path d=\"M12 2l2.9 6.9L22 9.6l-5.5 4.8L18 22l-6-3.9L6 22l1.5-7.6L2 9.6l7.1-.7z\"><\u002Fpath><\u002Fsvg>\n <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#C09173\"><path d=\"M12 2l2.9 6.9L22 9.6l-5.5 4.8L18 22l-6-3.9L6 22l1.5-7.6L2 9.6l7.1-.7z\"><\u002Fpath><\u002Fsvg>\n <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#C09173\"><path d=\"M12 2l2.9 6.9L22 9.6l-5.5 4.8L18 22l-6-3.9L6 22l1.5-7.6L2 9.6l7.1-.7z\"><\u002Fpath><\u002Fsvg>\n <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#C09173\"><path d=\"M12 2l2.9 6.9L22 9.6l-5.5 4.8L18 22l-6-3.9L6 22l1.5-7.6L2 9.6l7.1-.7z\"><\u002Fpath><\u002Fsvg>\n <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#C09173\"><path d=\"M12 2l2.9 6.9L22 9.6l-5.5 4.8L18 22l-6-3.9L6 22l1.5-7.6L2 9.6l7.1-.7z\"><\u002Fpath><\u002Fsvg>\n <\u002Fdiv>\n <p style=\"font-size:15px; line-height:1.65; color:#4A342B; margin:0 0 16px; font-style:italic;\">« J'ai vraiment eu un coup de cœur pour ce lieu. La terrasse en bois avec la petite piscine pour le pilates est hyper agréable, et la pièce de massage est douce, intime, on s'y sent tout de suite bien. Tout est pensé avec beaucoup de goût, Sandra a vraiment le sens du détail. Mais surtout, elle est juste top : très à l'écoute, elle prend le temps de comprendre les douleurs et d'adapter ce qu'elle propose. Clairement, une adresse que je recommande les yeux fermés. »<\u002Fp>\n <p style=\"font-size:14px; font-weight:600; color:#7A594F; margin:0;\">Sonia Curtil<\u002Fp>\n <\u002Fdiv>\n\n <div style=\"background:#FFF4D9; padding:28px 4px;\">\n <div style=\"display:flex; gap:3px; margin-bottom:14px;\">\n <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#C09173\"><path d=\"M12 2l2.9 6.9L22 9.6l-5.5 4.8L18 22l-6-3.9L6 22l1.5-7.6L2 9.6l7.1-.7z\"><\u002Fpath><\u002Fsvg>\n <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#C09173\"><path d=\"M12 2l2.9 6.9L22 9.6l-5.5 4.8L18 22l-6-3.9L6 22l1.5-7.6L2 9.6l7.1-.7z\"><\u002Fpath><\u002Fsvg>\n <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#C09173\"><path d=\"M12 2l2.9 6.9L22 9.6l-5.5 4.8L18 22l-6-3.9L6 22l1.5-7.6L2 9.6l7.1-.7z\"><\u002Fpath><\u002Fsvg>\n <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#C09173\"><path d=\"M12 2l2.9 6.9L22 9.6l-5.5 4.8L18 22l-6-3.9L6 22l1.5-7.6L2 9.6l7.1-.7z\"><\u002Fpath><\u002Fsvg>\n <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#C09173\"><path d=\"M12 2l2.9 6.9L22 9.6l-5.5 4.8L18 22l-6-3.9L6 22l1.5-7.6L2 9.6l7.1-.7z\"><\u002Fpath><\u002Fsvg>\n <\u002Fdiv>\n <p style=\"font-size:15px; line-height:1.65; color:#4A342B; margin:0 0 16px; font-style:italic;\">« Je recommande vivement l'atelier \"La posture… ton futur\", un incontournable ! Sandra est une très bonne pédagogue, très sympathique. J'ai beaucoup appris lors de ce stage. À faire absolument ! »<\u002Fp>\n <p style=\"font-size:14px; font-weight:600; color:#7A594F; margin:0;\">Karine Cateaux<\u002Fp>\n <\u002Fdiv>\n <\u002Fdiv>\n <\u002Fsection>\n\n \n <section data-screen-label=\"Tarifs\" style=\"padding:72px 28px 100px; background:#5F7055; color:#FFF9EA;\">\n <h2 style=\"font-family:'Gloock',serif; font-weight:400; font-size:28px; line-height:1.35; text-align:center; margin:0 0 40px; color:#FFF9EA;\">Rejoignez Bien Etre En Sport<\u002Fh2>\n\n <div style=\"background:#FFF9EA; border-radius:6px; padding:32px 28px; margin-bottom:24px;\">\n <p style=\"font-family:'Inter',sans-serif; font-weight:600; font-size:12px; letter-spacing:0.16em; text-transform:uppercase; color:#97946B; margin:0 0 10px;\">Tarif<\u002Fp>\n <p style=\"font-family:'Gloock',serif; font-weight:400; font-size:32px; margin:0 0 14px; color:#4A342B;\">À partir de 65 € <span style=\"font-family:'Inter',sans-serif; font-size:16px; font-weight:400; color:#6B5142;\">/ séance<\u002Fspan><\u002Fp>\n <p style=\"font-size:15px; line-height:1.65; color:#4A342B; margin:0;\">Séance individuelle ou en petit groupe, entièrement adaptée à vos besoins et à votre rythme.<\u002Fp>\n <\u002Fdiv>\n\n <div style=\"background:rgba(255,255,255,0.1); border-radius:6px; padding:28px; margin-bottom:36px;\">\n <p style=\"font-family:'Inter',sans-serif; font-weight:600; font-size:12px; letter-spacing:0.16em; text-transform:uppercase; color:#E8C79B; margin:0 0 20px;\">Infos pratiques<\u002Fp>\n <div style=\"display:flex; flex-direction:column; gap:18px; font-size:15px; line-height:1.5;\">\n <div style=\"display:flex; gap:14px; align-items:flex-start;\">\n <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#E8C79B\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0; margin-top:1px;\"><path d=\"M12 21s-7-6.2-7-11a7 7 0 0 1 14 0c0 4.8-7 11-7 11z\"><\u002Fpath><circle cx=\"12\" cy=\"10\" r=\"2.5\"><\u002Fcircle><\u002Fsvg>\n <p style=\"margin:0;\">10,
